theme: minimal-mistakes-jekyll
minimal_mistakes_skin: default
dark_mode_toggle: true

title: Minimal Mistakes Plus Scaffold
subtitle: A template for using Minimal Mistakes Plus
url: "https://josephtesfaye.github.io/minimal-mistakes-plus-scaffold/"
baseurl: "/minimal-mistakes-plus-scaffold"
repository: josephtesfaye/minimal-mistakes-plus-scaffold

search: true
search_full_content: true

author:
  name: Jane Doe
  avatar: https://mmistakes.github.io/minimal-mistakes/assets/images/mm-free-feature.png
  bio: An explorer at heart, I navigate the complex architecture of code and science while cultivating a life enriched by the rhythms of art, physical discipline, and the pursuit of quiet truths.
  location: Tokyo, Japan
  links:
    - label: Home
      icon: fas fa-fw fa-home
      url: https://josephtesfaye.com
    - label: GitHub
      icon: fab fa-fw fa-github
      url: https://github.com/josephtesfaye/minimal-mistakes-plus-scaffold/
footer:
  links:
    - label: Home
      icon: fas fa-fw fa-home
      url: https://josephtesfaye.com
    - label: GitHub
      icon: fab fa-fw fa-github
      url: https://github.com/josephtesfaye/minimal-mistakes-plus-scaffold/

copyright: Jane Doe
copyright_url: /minimal-mistakes-plus-scaffold/about/

include:
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# Outputting
permalink: /:categories/:title/
# paginate: 10
# paginate_path: /page:num/
timezone: Tokyo/Japan

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development

# Collections
collections:
  docs:
    output: true
    permalink: /:collection/:path/

defaults:
  # _docs
  - scope:
      path: ""
      type: docs
    values:
      layout: single
      read_time: false
      author_profile: false
      share: false
      comments: false
      toc_sticky: true
      sidebar:
        nav: "docs"
